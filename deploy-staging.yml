name: Deploy to Staging

on:
  push:
    branches:
      - staging

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: ${{ secrets.STAGING_S3_BUCKET }}
  EC2_HOST: ${{ secrets.STAGING_EC2_HOST }}
  EC2_USER: ubuntu
  DJANGO_SETTINGS_MODULE: symplichain.settings.staging

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: symplichain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        env:
          DATABASE_URL: postgres://testuser:testpassword@localhost:5432/symplichain_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
        run: |
          python manage.py test --verbosity=2

  deploy-backend:
    name: Deploy Django to Staging EC2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write SSH key
        run: |
          echo "${{ secrets.STAGING_EC2_SSH_KEY }}" > /tmp/staging.pem
          chmod 600 /tmp/staging.pem

      - name: Deploy to Staging EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/staging.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} << 'EOF'
            set -e
            cd /var/www/symplichain

            # Pull latest code
            git fetch origin staging
            git reset --hard origin/staging

            # Activate virtualenv
            source venv/bin/activate

            # Fetch secrets from AWS Secrets Manager
            export $(aws secretsmanager get-secret-value \
              --secret-id symplichain/staging \
              --query SecretString \
              --output text | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for k, v in d.items():
              print(f'{k}={v}')
          ")

            # Install/update dependencies
            pip install -r requirements.txt --quiet

            # Run DB migrations
            python manage.py migrate --noinput

            # Collect static files (uploaded to S3 in next job)
            python manage.py collectstatic --noinput

            # Restart Gunicorn
            sudo systemctl restart gunicorn

            # Restart Celery worker + beat
            sudo systemctl restart celery
            sudo systemctl restart celerybeat

            # Reload Nginx (in case config changed)
            sudo systemctl reload nginx

            echo "Staging backend deploy complete"
          EOF

  deploy-frontend:
    name: Build and Deploy React to S3/CloudFront (Staging)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app (staging)
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          REACT_APP_ENV: staging
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html must not be cached so browsers always get latest
          aws s3 cp frontend/build/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STAGING_CF_DISTRIBUTION_ID }} \
            --paths "/*"
